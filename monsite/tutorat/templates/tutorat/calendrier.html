{% extends 'tutorat/base.html' %}

{% block title %}Calendrier - Tutorat{% endblock %}

{% block extra_css %}
<link href='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/main.min.css' rel='stylesheet' />
<style>
    #calendar {
        max-width: 1200px;
        margin: 0 auto;
    }
    .fc-event {
        cursor: pointer;
    }
</style>
{% endblock %}

{% block content %}
<div class="row mb-4">
    <div class="col-md-8">
        <h1 class="display-5">📅 Calendrier des séances</h1>
    </div>
    <div class="col-md-4 text-end">
        {% if user.role == 'TUTEUR' %}
            <a href="{% url 'seance_create' %}" class="btn btn-primary">
                ➕ Créer une séance
            </a>
        {% endif %}
        <a href="{% url 'seance_list' %}" class="btn btn-secondary">
            📋 Vue liste
        </a>
    </div>
</div>

<div class="card shadow">
    <div class="card-body">
        <div id='calendar'></div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js'></script>
<script>
document.addEventListener('DOMContentLoaded', function() {
    var calendarEl = document.getElementById('calendar');
    
    var calendar = new FullCalendar.Calendar(calendarEl, {
        initialView: 'dayGridMonth',
        locale: 'fr',
        headerToolbar: {
            left: 'prev,next today',
            center: 'title',
            right: 'dayGridMonth,timeGridWeek,timeGridDay'
        },
        buttonText: {
            today: "Aujourd'hui",
            month: 'Mois',
            week: 'Semaine',
            day: 'Jour'
        },
        events: '{% url "seances_json" %}',
        eventClick: function(info) {
            info.jsEvent.preventDefault();
            if (info.event.url) {
                window.location.href = info.event.url;
            }
        },
        eventTimeFormat: {
            hour: '2-digit',
            minute: '2-digit',
            hour12: false
        },
        slotMinTime: '08:00:00',
        slotMaxTime: '20:00:00',
        allDaySlot: false,
        height: 'auto',
        navLinks: true,
        editable: false,
        dayMaxEvents: true,
    });
    
    calendar.render();
});
</script>
{% endblock %}
