{% extends 'tutorat/base.html' %}
{% load crispy_forms_tags %}

{% block title %}Connexion - Tutorat{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow">
            <div class="card-header bg-primary text-white">
                <h3 class="mb-0">🔐 Connexion</h3>
            </div>
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    {{ form|crispy }}
                    
                    <button type="submit" class="btn btn-primary w-100 mt-3">
                        Se connecter
                    </button>
                </form>
                
                <hr>
                
                <p class="text-center mb-0">
                    Pas encore de compte ? <a href="{% url 'inscription_etudiant' %}">S'inscrire en tant qu'étudiant</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
